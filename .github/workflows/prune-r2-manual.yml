name: Prune R2 releases (manual)

# Manually prune old release artifacts from the R2 bucket. Defaults to a dry
# run so you can preview what would be deleted before committing to it.
#   Actions tab -> "Prune R2 releases (manual)" -> Run workflow
on:
  workflow_dispatch:
    inputs:
      keep:
        description: 'Number of newest versions to retain'
        required: true
        default: '2'
      dry_run:
        description: 'Preview only (no deletions)'
        type: boolean
        required: true
        default: true

permissions:
  contents: read

concurrency:
  group: prune-r2
  cancel-in-progress: false

jobs:
  prune:
    name: Prune R2 artifacts
    environment: Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Prune R2 releases
        run: bash scripts/prune-r2-releases.sh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_RELEASES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_RELEASES_SECRET_ACCESS_KEY }}
          R2_RELEASES_ACCOUNT_ID: ${{ secrets.R2_RELEASES_ACCOUNT_ID }}
          R2_RELEASES_BUCKET: ${{ secrets.R2_RELEASES_BUCKET }}
          KEEP: ${{ inputs.keep }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}

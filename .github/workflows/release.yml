name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-mac:
    environment: Production

    name: Build and Publish macOS
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Verify signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          trap 'rm -f /tmp/cert.p12' EXIT
          [ -n "$CSC_LINK" ] || { echo "ERROR: CSC_LINK empty"; exit 1; }
          echo "$CSC_LINK" | base64 -d > /tmp/cert.p12
          security import /tmp/cert.p12 -P "$CSC_KEY_PASSWORD" -A 2>&1 | tee /tmp/cert-import.log
          import_exit="${PIPESTATUS[0]}"
          if [ "$import_exit" -ne 0 ] || grep -q "Unknown format" /tmp/cert-import.log; then
            echo "ERROR: certificate import failed (exit=$import_exit)"
            exit 1
          fi
          echo "Certificate OK"

      - name: Publish macOS
        run: npx electron-builder --mac --publish always --config electron-builder.cjs
        env:
          # ── R2 is S3-compatible. Use provider: s3 with custom endpoint ────────────────────
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_RELEASES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_RELEASES_SECRET_ACCESS_KEY }}
          R2_RELEASES_ACCOUNT_ID: ${{ secrets.R2_RELEASES_ACCOUNT_ID }}
          R2_RELEASES_BUCKET: ${{ secrets.R2_RELEASES_BUCKET }}
          # Public, credential-free read URL for the auto-updater (custom domain or
          # pub-*.r2.dev). Baked into app-update.yml at build time.
          R2_RELEASES_PUBLIC_URL: ${{ secrets.R2_RELEASES_PUBLIC_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ── Apple notarization and signing ────────────────────
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_FOR_PULL_REQUEST: false

  prune:
    # Delete stale release artifacts once the new version is published, keeping
    # the newest 2 versions so electron-updater can still delta-patch N-1 -> N.
    name: Prune old R2 artifacts
    needs: build-mac
    environment: Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Prune R2 releases
        run: bash scripts/prune-r2-releases.sh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_RELEASES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_RELEASES_SECRET_ACCESS_KEY }}
          R2_RELEASES_ACCOUNT_ID: ${{ secrets.R2_RELEASES_ACCOUNT_ID }}
          R2_RELEASES_BUCKET: ${{ secrets.R2_RELEASES_BUCKET }}
          KEEP: '2'
